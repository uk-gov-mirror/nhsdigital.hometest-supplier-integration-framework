name: Validate FHIR Examples

on:
  push:
    branches:
      - "main"
    paths:
      - 'examples/fhir/**'
      - 'tests/fhir-examples/**'
      - '.github/workflows/validate-fhir-examples.yml'
  pull_request:
    types: [ opened, reopened, synchronize ]
    paths:
      - 'examples/fhir/**'
      - 'tests/fhir-examples/**'
      - '.github/workflows/validate-fhir-examples.yml'
  workflow_dispatch:
    inputs:
      fhir_version:
        description: 'FHIR version to validate against'
        required: false
        default: '4.0.1'
      validator_version:
        description: 'FHIR validator version to use'
        required: false
        default: '6.9.5'

jobs:
  validate:
    name: Validate FHIR examples
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set CI variables
        id: vars
        run: |
          echo "fhir_version=${{ inputs.fhir_version || '4.0.1' }}" >> "$GITHUB_OUTPUT"
          echo "validator_version=${{ inputs.validator_version || '6.9.5' }}" >> "$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: '25'

      - name: Cache FHIR validator JAR
        id: cache-jar
        uses: actions/cache@v5.0.4
        with:
          path: .local/validator
          key: fhir-validator-jar-${{ steps.vars.outputs.validator_version }}

      - name: Download FHIR validator JAR
        if: steps.cache-jar.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .local/validator
          gh release download ${{ steps.vars.outputs.validator_version }} \
            --pattern '*.jar' \
            --repo 'hapifhir/org.hl7.fhir.core' \
            --dir .local/validator

      - name: Set JAR path
        run: echo "JAR=$(ls .local/validator/*.jar | head -1)" >> "$GITHUB_ENV"

      - name: Cache FHIR validator cache
        uses: actions/cache@v5.0.4
        with:
          path: .local/cache
          key: fhir-validator-cache-${{ steps.vars.outputs.fhir_version }}-${{ steps.vars.outputs.validator_version }}
          restore-keys: |
            fhir-validator-cache-${{ steps.vars.outputs.fhir_version }}-
            fhir-validator-cache-

      - name: Run FHIR validation (FHIR R${{ steps.vars.outputs.fhir_version }})
        id: validate
        continue-on-error: true
        run: |
          tests/fhir-examples/fhir-validator.sh \
            -j "$JAR" \
            -i examples/fhir \
            -o .local/results \
            -v "${{ steps.vars.outputs.fhir_version }}" \
            -c .local/cache

      - name: Upload validation results
        uses: actions/upload-artifact@v7.0.1
        with:
          name: fhir-validation-results
          path: .local/results/
          if-no-files-found: warn

  report:
    name: Post validation report
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Download validation results
        uses: actions/download-artifact@v8.0.1
        continue-on-error: true
        with:
          name: fhir-validation-results
          path: .local/results/

      - name: Set up Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24

      - name: Generate comment body
        env:
          RESULTS_PATH: .local/results/results.json
          VALIDATION_OUTCOME: ${{ needs.validate.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          OUTPUT_PATH: .local/comment-body.md
        run: node .github/scripts/generate-validation-comment.js

      - name: Find existing validation comment
        id: find-comment
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: '<!-- fhir-validation -->'

      - name: Post or update PR comment
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: .local/comment-body.md
          edit-mode: replace
